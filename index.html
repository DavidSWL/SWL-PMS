<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SWL Performance Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #0E4C2D;
      --green-dark: #0A3B22;
      --sage:       #D3DED7;
      --sage-light: #EDF2EF;
      --white:      #ffffff;
      --text:       #0D1F16;
      --text-muted: #5A7A6A;
      --border:     #C4D5CC;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #072818 0%, #0A3B22 50%, #0E4C2D 100%);
      position: relative;
      overflow: hidden;
      padding: 1.5rem;
    }


    /* White login card */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 400px;
      background: var(--white);
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 24px 60px rgba(7,40,24,0.5), 0 4px 16px rgba(7,40,24,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Logo circle */
    .logo-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--sage-light);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .logo-circle img {
      width: 64px; height: 64px;
      object-fit: contain;
    }

    .brand-name {
      font-size: 1.25rem; font-weight: 800; color: var(--text);
      letter-spacing: -0.02em; margin-bottom: 0.15rem;
    }
    .brand-sub {
      font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.75rem;
    }

    .form-wrap { width: 100%; text-align: left; }

    .form-field { margin-bottom: 0.875rem; }
    .form-field label {
      display: block; font-size: 0.7rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: 0.07em;
      text-transform: uppercase; margin-bottom: 0.4rem;
    }
    .form-field input {
      width: 100%; padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text);
      font-size: 0.9375rem; font-family: inherit; outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .form-field input::placeholder { color: #A8BFB4; }
    .form-field input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(14,76,45,0.1);
    }

    .error-msg {
      display: none; background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 8px; color: #B91C1C;
      font-size: 0.8rem; font-weight: 500;
      padding: 0.6rem 0.875rem; margin-bottom: 1rem;
      width: 100%; text-align: left;
    }
    .error-msg.show { display: block; }

    /* Password wrapper with eye toggle */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.75rem; }
    .pw-toggle {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0.25rem;
      color: var(--text-muted); display: flex; align-items: center;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: var(--green); }
    .pw-toggle svg { width: 18px; height: 18px; display: block; }

    /* Remember me row */
    .remember-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; margin-top: 0.25rem;
    }
    .remember-label {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.8rem; color: var(--text-muted); cursor: pointer;
      user-select: none;
    }
    .remember-label input[type="checkbox"] {
      width: 15px; height: 15px; accent-color: var(--green);
      cursor: pointer; margin: 0; flex-shrink: 0;
    }
    .forgot-link {
      font-size: 0.8rem; color: var(--green); font-weight: 600;
      text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }

    .btn-signin {
      width: 100%; padding: 0.875rem; border-radius: 10px; border: none;
      cursor: pointer; background: var(--green); color: #fff;
      font-size: 0.9375rem; font-weight: 700; font-family: inherit;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 14px rgba(14,76,45,0.3);
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
      margin-top: 0.25rem;
    }
    .btn-signin:hover { background: var(--green-dark); box-shadow: 0 6px 18px rgba(14,76,45,0.4); }
    .btn-signin:active { transform: scale(0.99); }
    .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; }

    .footer-note {
      text-align: center; margin-top: 1.25rem;
      font-size: 0.75rem; color: var(--text-muted);
    }
    .footer-note a { color: var(--green); font-weight: 600; text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    .page-footer {
      position: relative; z-index: 10;
      margin-top: 1.75rem;
      font-size: 0.72rem; color: rgba(211,222,215,0.3);
      text-align: center;
    }

    .spinner {
      display: inline-block; width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo-circle">
    <img src="logo.png" alt="SouthWest Landscape">
  </div>

  <div class="brand-name">SouthWest Landscape</div>
  <div class="brand-sub">Performance Management System</div>

  <div class="form-wrap">
    <div class="error-msg" id="error-msg"></div>

    <form id="login-form" novalidate="">
      <div class="form-field">
        <label for="email">Work Email</label>
        <input type="email" id="email" name="email" placeholder="you@southwestlandscape.com" autocomplete="email" required="">
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required="">
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <!-- eye icon -->
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              <circle cx="12" cy="12" r="3" stroke-linecap="round"></circle>
            </svg>
            <!-- eye-off icon (hidden by default) -->
            <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.563-4.312M6.7 6.7A9.965 9.965 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.284 2.567M3 3l18 18"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" id="remember-me">
          Remember me
        </label>
        <a href="mailto:admin@southwestlandscape.com" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn-signin" id="signin-btn">Sign In →</button>
    </form>

    <p class="footer-note">
      Need access? <a href="mailto:admin@southwestlandscape.com">Contact your administrator.</a>
    </p>

  </div>
</div>

<div class="page-footer">© 2025 SouthWest Landscape</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA6XJoxNAuNX0LN21WxBLS7cMbY3LJCri0",
    authDomain: "swl-pms.firebaseapp.com",
    projectId: "swl-pms",
    storageBucket: "swl-pms.firebasestorage.app",
    messagingSenderId: "465838605580",
    appId: "1:465838605580:web:c3322da1833f219725b529"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'dashboard.html';
  });

  const form     = document.getElementById('login-form');
  const btn      = document.getElementById('signin-btn');
  const errorMsg = document.getElementById('error-msg');

  // Password visibility toggle
  const pwToggle   = document.getElementById('pw-toggle');
  const pwInput    = document.getElementById('password');
  const eyeIcon    = document.getElementById('eye-icon');
  const eyeOffIcon = document.getElementById('eye-off-icon');
  pwToggle.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.style.display    = show ? 'none'  : 'block';
    eyeOffIcon.style.display = show ? 'block' : 'none';
    pwToggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  });

  // Remember me — restore saved email
  const rememberBox   = document.getElementById('remember-me');
  const emailInput    = document.getElementById('email');
  const savedEmail    = localStorage.getItem('swl_remembered_email');
  if (savedEmail) { emailInput.value = savedEmail; rememberBox.checked = true; }

  function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('show'); }
  function clearError()   { errorMsg.classList.remove('show'); }

  function setLoading(on) {
    btn.disabled = on;
    btn.innerHTML = on ? '<span class="spinner"></span>Signing in…' : 'Sign In →';
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    clearError();
    const email    = emailInput.value.trim();
    const password = pwInput.value;
    if (!email || !password) { showError('Please enter your email and password.'); return; }
    setLoading(true);
    try {
      await signInWithEmailAndPassword(auth, email, password);
      if (rememberBox.checked) {
        localStorage.setItem('swl_remembered_email', email);
      } else {
        localStorage.removeItem('swl_remembered_email');
      }
    } catch (err) {
      const msgs = {
        'auth/user-not-found':     'No account found with that email.',
        'auth/wrong-password':     'Incorrect password. Please try again.',
        'auth/invalid-email':      'Please enter a valid email address.',
        'auth/too-many-requests':  'Too many attempts. Please wait a moment.',
        'auth/invalid-credential': 'Invalid email or password.',
      };
      showError(msgs[err.code] || 'Sign in failed. Please try again.');
      setLoading(false);
    }
  });
</script>


</body></html>
