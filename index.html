<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SWL-PMS — SouthWest Landscape Performance Management System" />
  <title>Sign In — SWL Performance Management</title>

  <link rel="stylesheet"  href="css/styles.css" />
  <link rel="manifest"    href="manifest.json" />
  <link rel="icon"        href="assets/logo/favicon.svg" type="image/svg+xml" />
</head>
<body>

<!-- ═══════════════════════════════════════════════
     LOGIN PAGE
     ═══════════════════════════════════════════════ -->
<main class="login-bg" role="main">

  <!-- CSS tree-silhouette layer -->
  <div class="login-trees" aria-hidden="true"></div>

  <!-- ── Login Card ────────────────────────────── -->
  <div class="login-card" role="region" aria-label="Sign in to your account">

    <!-- Logo Mark -->
    <div class="login-card__logo-wrap">
      <div class="login-card__logo" aria-hidden="true">
        <!-- Inline SVG: stylized leaf / landscape icon -->
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Ground line -->
          <path d="M6 36 Q24 26 42 36" stroke-linecap="round"/>
          <!-- Tree 1 -->
          <path d="M14 36 L14 24 M10 28 L14 24 L18 28" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Tree 2 (taller) -->
          <path d="M24 36 L24 18 M19 24 L24 18 L29 24" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Tree 3 -->
          <path d="M34 36 L34 25 M30 29 L34 25 L38 29" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Sun / arc -->
          <path d="M8 18 Q24 8 40 18" stroke-linecap="round" stroke-dasharray="2 3"/>
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="login-card__title">SWL Performance Management</h1>
    <p  class="login-card__subtitle">Improving Landscapes Through Managed Care</p>

    <!-- Inline error/success banner (hidden by default) -->
    <div id="auth-alert" class="alert alert-error hidden" role="alert" aria-live="polite">
      <span class="alert-icon" aria-hidden="true">⚠</span>
      <span id="auth-alert-msg"></span>
    </div>

    <!-- ── Sign-In Form ─────────────────────────── -->
    <form id="login-form" class="login-card__form" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          placeholder="you@southwestlandscape.com"
          required
        />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
        />
      </div>

      <!-- Remember Me + Forgot Password row -->
      <div class="login-card__row">
        <div class="form-checkbox-group">
          <input
            class="form-checkbox"
            type="checkbox"
            id="remember-me"
            name="remember-me"
          />
          <label class="form-checkbox-label" for="remember-me">Remember me</label>
        </div>

        <a href="#" class="login-card__forgot" id="forgot-password-link">
          Forgot password?
        </a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary btn-lg btn-full" id="login-btn">
        Sign In
      </button>

    </form>

    <p class="login-card__footer">
      &copy; <span id="footer-year"></span> SouthWest Landscape &mdash; All rights reserved
    </p>
  </div>
</main>

<!-- ── Forgot Password Modal ─────────────────────────────────── -->
<div id="reset-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="reset-modal-title">
  <div class="login-bg" style="position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;display:flex;">
    <div class="login-card" style="max-width:400px;">
      <h2 class="login-card__title" id="reset-modal-title" style="font-size:1.25rem;">Reset your password</h2>
      <p style="font-size:0.875rem;color:var(--color-gray-600);margin:0.5rem 0 1.5rem;">
        Enter your email and we'll send you a reset link.
      </p>

      <div id="reset-alert" class="alert alert-success hidden" role="alert" aria-live="polite">
        <span class="alert-icon" aria-hidden="true">✓</span>
        <span id="reset-alert-msg"></span>
      </div>

      <form id="reset-form" class="login-card__form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reset-email">Email address</label>
          <input class="form-input" type="email" id="reset-email" required placeholder="you@southwestlandscape.com" />
        </div>
        <div style="display:flex;gap:0.75rem;">
          <button type="button" id="reset-cancel" class="btn btn-secondary btn-full">Cancel</button>
          <button type="submit"                   class="btn btn-primary  btn-full" id="reset-btn">Send link</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ── Scripts ────────────────────────────────────────────────── -->
<script type="module">
  import { login, redirectIfAuthenticated, requestPasswordReset, friendlyAuthError } from './js/auth.js';

  // ── Footer year ─────────────────────────────────────────
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  // ── If already signed in, skip to dashboard ──────────────
  await redirectIfAuthenticated();

  // ── DOM refs ─────────────────────────────────────────────
  const form        = document.getElementById('login-form');
  const emailEl     = document.getElementById('email');
  const passwordEl  = document.getElementById('password');
  const rememberEl  = document.getElementById('remember-me');
  const loginBtn    = document.getElementById('login-btn');
  const alertBox    = document.getElementById('auth-alert');
  const alertMsg    = document.getElementById('auth-alert-msg');

  const forgotLink  = document.getElementById('forgot-password-link');
  const resetModal  = document.getElementById('reset-modal');
  const resetForm   = document.getElementById('reset-form');
  const resetEmailEl= document.getElementById('reset-email');
  const resetBtn    = document.getElementById('reset-btn');
  const resetCancel = document.getElementById('reset-cancel');
  const resetAlert  = document.getElementById('reset-alert');
  const resetAlertMsg = document.getElementById('reset-alert-msg');

  // ── Helpers ──────────────────────────────────────────────
  function showError(message) {
    alertBox.classList.remove('hidden', 'alert-success');
    alertBox.classList.add('alert-error');
    alertMsg.textContent = message;
    emailEl.classList.add('is-error');
    passwordEl.classList.add('is-error');
  }

  function clearError() {
    alertBox.classList.add('hidden');
    emailEl.classList.remove('is-error');
    passwordEl.classList.remove('is-error');
  }

  function setLoading(loading) {
    loginBtn.disabled = loading;
    loginBtn.innerHTML = loading
      ? '<span class="btn-spinner" aria-hidden="true"></span> Signing in…'
      : 'Sign In';
  }

  // ── Login form submission ─────────────────────────────────
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const email    = emailEl.value.trim();
    const password = passwordEl.value;
    const remember = rememberEl.checked;

    if (!email || !password) {
      showError('Please enter your email address and password.');
      return;
    }

    setLoading(true);
    try {
      await login(email, password, remember);
      window.location.href = '/dashboard.html';
    } catch (err) {
      showError(friendlyAuthError(err));
      setLoading(false);
    }
  });

  // Clear errors on input
  [emailEl, passwordEl].forEach(el =>
    el.addEventListener('input', clearError)
  );

  // ── Forgot password flow ──────────────────────────────────
  forgotLink.addEventListener('click', (e) => {
    e.preventDefault();
    resetEmailEl.value = emailEl.value.trim();
    resetAlert.classList.add('hidden');
    resetModal.classList.remove('hidden');
    resetEmailEl.focus();
  });

  resetCancel.addEventListener('click', () => {
    resetModal.classList.add('hidden');
  });

  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = resetEmailEl.value.trim();
    if (!email) return;

    resetBtn.disabled = true;
    resetBtn.textContent = 'Sending…';
    try {
      await requestPasswordReset(email);
      resetAlert.classList.remove('hidden', 'alert-error');
      resetAlert.classList.add('alert-success');
      resetAlertMsg.textContent = `Reset link sent to ${email}. Check your inbox.`;
      resetBtn.textContent = 'Sent!';
      setTimeout(() => resetModal.classList.add('hidden'), 3000);
    } catch (err) {
      resetAlert.classList.remove('hidden', 'alert-success');
      resetAlert.classList.add('alert-error');
      resetAlertMsg.textContent = friendlyAuthError(err);
      resetBtn.disabled = false;
      resetBtn.textContent = 'Send link';
    }
  });
</script>

</body>
</html>
